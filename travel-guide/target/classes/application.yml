server:
  port: 8080

spring:
  application:
    name: travel-guide
  datasource:
    url: jdbc:h2:file:./data/travelguide
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

travel-guide:
  upload-dir: ./uploads/photos
